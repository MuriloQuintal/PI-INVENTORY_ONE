<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InventoryOne</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/configuracao.css">
</head>

<body>
    <main class="container">
        <section class="conteudo_principal">
            <header class="cabecalho">
                <nav>
                    <img src="../img/logo-inventoryone.png" alt="">

                    <ul>
                        <li>
                            <a href="">
                                <i class="bi bi-speedometer2"></i>
                                Dashboard
                            </a>
                        </li>
                        <li>
                            <a href="">
                                <i class="bi bi-clipboard2-check"></i>
                                Inventariar
                            </a>
                        </li>
                        <li>
                            <a href="">
                                <i class="bi bi-box-seam"></i>
                                Produtos
                            </a>
                        </li>
                        <li>
                            <a href="">
                                <i class="bi bi-people"></i>
                                Pessoas
                            </a>
                        </li>
                        <li>
                            <a href="">
                                <i class="bi bi-archive"></i>
                                Inventário
                            </a>
                        </li>
                    </ul>

                    <div class="usuario_logado_header">
                        <i class="bi bi-person-circle"></i>
                        <div class="usuario_logado_header_informacoes">
                            <span class="usuario_logado_header_nome">Victor Chinaglia</span>
                            <span>chinagliavictor@gmail.com</span>
                        </div>
                    </div>
                </nav>
            </header>


            <div class="container">
                <div class="row g-2">
                    <div class="col-12 col-sm-4">
                        <div class="card_dashboard">

                            <div class="card_dashboard_header_sucesso">
                                <i class="bi bi-phone"></i>
                                Inventário
                            </div>

                            <div class="card_dashboard_valor_success">
                                <p id="valorTotal"></p>
                            </div>

                            <div class="card_dashboard_descricao">
                                <p>Valor Total</p>
                                <p class="card_descricao_subtitulo">Valor Total do Inventário</p>
                            </div>

                        </div>
                    </div>
                    <div class="col-12 col-sm-4">
                        <div class="card_dashboard">

                            <div class="card_dashboard_header_danger">
                                <i class="bi bi-phone"></i>
                                Depreciação
                            </div>

                            <div class="card_dashboard_valor_danger">
                                <p id="depreciacaoTotal"></p>
                            </div>

                            <div class="card_dashboard_descricao">
                                <p>Valor Total</p>
                                <p class="card_descricao_subtitulo">Valor Total da Depreciação</p>
                            </div>

                        </div>
                    </div>
                    <div class="col-12 col-sm-4">
                        <div class="card_dashboard">

                            <div class="card_dashboard_header_info">
                                <i class="bi bi-phone"></i>
                                Inventário
                            </div>

                            <div class="card_dashboard_valor_info">
                                <p id="valorAtualTotal"></p>
                            </div>

                            <div class="card_dashboard_descricao">
                                <p>Valor Total</p>
                                <p class="card_descricao_subtitulo">Valor Liquído Total</p>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <div class="container mt-3">
                <div class="row" id="containerCardsProdutos">
                   
                </div>

            </div>
        </section>

    </main>
    <script src="../js/dashboard.js"></script>

</body>

</html>
